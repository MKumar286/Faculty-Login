<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Department Placement Coordinator Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0d47a1,#1565c0,#42a5f5);

height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.login-box{

width:430px;
background:#fff;
border-radius:15px;
padding:35px;
box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.logo{

text-align:center;
margin-bottom:15px;

}

.logo img{

width:80px;

}

h2{

text-align:center;
color:#0d47a1;
margin-bottom:5px;

}

.tagline{

text-align:center;
font-size:14px;
color:#666;
margin-bottom:25px;

}

.input-group{

margin-bottom:18px;

}

label{

display:block;
margin-bottom:6px;
font-size:14px;
font-weight:500;
color:#333;

}

input,select{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;

}

input:focus,
select:focus{

border-color:#1565c0;

}

.options{

display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:20px;

}

.options a{

text-decoration:none;
color:#1565c0;

}

button{

width:100%;
padding:13px;
border:none;
background:#1565c0;
color:white;
font-size:16px;
font-weight:600;
border-radius:8px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#0d47a1;

}

.footer{

margin-top:20px;
text-align:center;
font-size:13px;
color:#666;

}

.footer span{

color:#1565c0;
font-weight:600;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<!-- Replace with MGIT Logo -->
<img src="logo.png">

</div>

<h2>Department Placement Coordinator</h2>

<p class="tagline">
Monitor Student Progress • Track Placements • Support Career Success
</p>

<form>

<div class="input-group">

<label>Academic Year</label>

<select>
<option>2026-2027</option>
<option>2025-2026</option>
</select>

</div>

<div class="input-group">

<label>Department</label>

<select>

<option>Select Department</option>

<option>CSE</option>
<option>CSM</option>
<option>CSD</option>
<option>IT</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
<option>CIVIL</option>

</select>

</div>

<div class="input-group">

<label>Official Email</label>

<input type="email" placeholder="Enter College Email">

</div>

<div class="input-group">

<label>Password</label>

<input type="password" placeholder="Enter Password">

</div>

<div class="options">

<label>
<input type="checkbox">
Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">

LOGIN

</button>

</form>

<div class="footer">

MGIT Placement Portal<br>

<span>Department Placement Coordinator Portal</span>

</div>

</div>

</body>
</html>
