<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department Placement Coordinator Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0F172A; /* Professional Dark Navy */
}

.login-box{
    width:360px;
    background:#ffffff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

h2{
    text-align:center;
    color:#0F172A;
    margin-bottom:8px;
    font-size:26px;
}

.subtitle{
    text-align:center;
    color:#64748B;
    font-size:14px;
    margin-bottom:28px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    font-size:14px;
    font-weight:600;
    color:#334155;
    margin-bottom:7px;
}

input{
    width:100%;
    padding:12px 14px;
    border:1px solid #CBD5E1;
    border-radius:8px;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#2563EB;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#2563EB;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1D4ED8;
}

.footer{
    margin-top:22px;
    text-align:center;
    color:#64748B;
    font-size:13px;
}
</style>

</head>
<body>

<div class="login-box">

    <h2>Coordinator Login</h2>

    <p class="subtitle">
        Department Placement Coordinator Portal
    </p>

    <form>

        <div class="input-group">
            <label>Email ID</label>
            <input type="email" placeholder="Enter your official email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        MGIT Placement Portal
    </div>

</div>

</body>
</html>
