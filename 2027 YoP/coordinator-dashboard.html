<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coordinator Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    background:#F1F5F9;
}

/* Sidebar */

.sidebar{

    width:250px;
    height:100vh;
    background:#0F172A;
    color:white;
    position:fixed;
    left:0;
    top:0;

}

.logo{

    padding:25px;
    text-align:center;
    font-size:20px;
    font-weight:600;
    border-bottom:1px solid rgba(255,255,255,.1);

}

.logo span{

    color:#38BDF8;

}

.menu{

    margin-top:20px;

}

.menu a{

    display:flex;
    align-items:center;
    gap:12px;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    transition:.3s;

}

.menu a:hover{

    background:#2563EB;

}

.main{

    margin-left:250px;
    width:100%;
    padding:30px;

}

.header{

    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.header h2{

    color:#0F172A;

}

.header p{

    color:#64748B;
    margin-top:5px;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

MGIT <span>Portal</span>

</div>

<div class="menu">

<a href="#">🏠 Dashboard</a>

<a href="#">👨‍🎓 Students</a>

<a href="#">🏢 Companies</a>

<a href="#">📊 Placement Status</a>

<a href="#">📄 Reports</a>

<a href="#">⬇️ Download Data</a>

<a href="#">👤 Profile</a>

<a href="#">🚪 Logout</a>

</div>

</div>

<div class="main">

<div class="header">

<h2>Department Placement Coordinator Dashboard</h2>

<p>Monitor Student Progress • Track Placements • Support Career Success</p>

</div>

</div>

</body>
</html>
